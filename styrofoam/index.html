<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Model Viewer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.min.js"></script>

<style>
    body { margin: 0; overflow: hidden; }
    #controls {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 10px;
        border-radius: 5px;
    }
    button {
        display: block;
        margin: 5px 0;
        width: 150px;
    }
</style>
</head>

<body>

<div id="controls">
    <button onclick="toggleClip('x')">Toggle X Clip</button>
    <button onclick="toggleClip('y')">Toggle Y Clip</button>
    <button onclick="toggleClip('z')">Toggle Z Clip</button>
    <button onclick="resetCamera()">Reset View</button>
</div>

<canvas id="viewer"></canvas>

<script>
let scene, camera, renderer, controls;
let model, materials = [];
let modelSize = new THREE.Vector3();

let clippingPlanes = {
    x: new THREE.Plane(new THREE.Vector3(-1,0,0), 0),
    y: new THREE.Plane(new THREE.Vector3(0,-1,0), 0),
    z: new THREE.Plane(new THREE.Vector3(0,0,-1), 0)
};

let clipState = { x:false, y:false, z:false };

function init(){
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    camera = new THREE.PerspectiveCamera(25, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(-2,2,-2);

    renderer = new THREE.WebGLRenderer({ canvas: viewer, antialias:true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.localClippingEnabled = true;

    controls = new THREE.OrbitControls(camera, renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const light = new THREE.DirectionalLight(0xffffff, 0.6);
    light.position.set(1,1,1);
    scene.add(light);

    loadModel("model.glb");

    window.addEventListener("resize", onResize);
    animate();
}

function loadModel(path){
    const loader = new THREE.GLTFLoader();
    loader.load(path, (gltf)=>{
        model = gltf.scene;
        materials = [];

        model.traverse(child=>{
            if(child.isMesh){
                const mat = new THREE.MeshStandardMaterial({
                    color: 0xcccccc,
                    metalness: 0.2,
                    roughness: 0.5,
                    side: THREE.DoubleSide
                });

                child.material = mat;
                materials.push(mat);
            }
        });

        scene.add(model);

        const box = new THREE.Box3().setFromObject(model);
        box.getSize(modelSize);

        model.position.sub(box.getCenter(new THREE.Vector3()));

        applyClipping();
    });
}

function toggleClip(axis){
    clipState[axis] = !clipState[axis];
    applyClipping();
}

function applyClipping(){
    let activePlanes = [];

    if(clipState.x){
        clippingPlanes.x.constant = modelSize.x/2;
        activePlanes.push(clippingPlanes.x);
    }
    if(clipState.y){
        clippingPlanes.y.constant = modelSize.y/2;
        activePlanes.push(clippingPlanes.y);
    }
    if(clipState.z){
        clippingPlanes.z.constant = modelSize.z/2;
        activePlanes.push(clippingPlanes.z);
    }

    materials.forEach(m=>{
        m.clippingPlanes = activePlanes;
        m.needsUpdate = true;
    });
}

function animate(){
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

function onResize(){
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function resetCamera(){
    camera.position.set(-2,2,-2);
    controls.target.set(0,0,0);
    controls.update();
}

init();
</script>

</body>
</html>
